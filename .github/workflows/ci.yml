name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  checks:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine3.22
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app -d app_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      TZ: UTC
      HOST: localhost
      PORT: 3333
      NODE_ENV: test
      LOG_LEVEL: silent
      APP_KEY: zKXHe-Ahdb7aPK1ylAJlRgTefktEaACi
      APP_URL: http://localhost:3333
      APP_NAME: romainlanz.com
      APP_ENV: development
      APP_VERSION: ci
      MONOCLE_API_KEY: ''
      REDIRECT_DOMAIN: redirect.localhost
      SESSION_DRIVER: memory
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: app
      DB_PASSWORD: app
      DB_DATABASE: app_test
      TWITCH_CLIENT_ID: test-client-id
      TWITCH_CLIENT_SECRET: test-client-secret
      MAIL_DRIVER: smtp
      SMTP_HOST: 127.0.0.1
      SMTP_PORT: 1025

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint

      - name: Format
        run: yarn format:check

      - name: Run migrations
        run: yarn workspace @rlanz/site exec node ace migrate

      - name: Test
        run: yarn workspace @rlanz/site test

  build-and-push-image:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: checks
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=match,pattern=v(.*),group=1

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
